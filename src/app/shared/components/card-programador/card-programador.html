<div class="border border-white/10 bg-white/5 rounded-xl p-8 flex flex-col gap-5 hover:border-cyan-500/40 transition-all h-full">

  <div class="flex items-center gap-4">
    <img [src]="programador().fotoPerfil" [alt]="programador().nombre"
      class="w-20 h-20 rounded-full object-cover border-2 border-cyan-500/30 shrink-0" />
    <div class="min-w-0">
      <h3 class="text-white font-bold text-xl truncate">{{ programador().nombre }}</h3>
      <p class="text-cyan-400 text-xs font-mono tracking-widest uppercase mt-1">
        {{ programador().especialidad }}
      </p>
    </div>
  </div>

  <p class="text-white/50 text-sm leading-relaxed line-clamp-3">
    {{ programador().descripcionBreve }}
  </p>

  <a [routerLink]="['/perfil', programador().slug]"
     class="text-cyan-400 text-xs font-mono tracking-widest uppercase hover:text-white transition-colors flex items-center gap-2 mt-auto">
    Revisar Perfil A Detalle →
  </a>

</div>
