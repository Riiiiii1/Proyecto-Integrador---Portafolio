<div class="border border-white/10 bg-white/5 rounded-xl p-6 flex flex-col gap-4 hover:border-cyan-500/40 transition-all h-full">

  <!-- Foto grande arriba centrada -->
  <div class="flex flex-col items-center text-center gap-3">
    <img 
      [src]="programador().fotoPerfil" 
      [alt]="programador().nombre"
      class="w-48 h-48 rounded-full object-cover border-2 border-cyan-500/30"/>

    <div>
      <h3 class="text-white font-bold text-lg">{{ programador().nombre }}</h3>
      <p class="text-cyan-400 text-xs font-mono tracking-widest uppercase">
        {{ programador().especialidad }}
      </p>
    </div>
  </div>

  <!-- Descripción -->
  <p class="text-white/50 text-sm leading-relaxed flex-1 text-center">
    {{ programador().descripcionBreve }}
  </p>

  <!-- Tags de tecnologías -->
  <div class="flex flex-wrap gap-2 justify-center">
    @for (tech of programador().stack; track tech) {
      <span class="text-xs px-3 py-1 rounded border border-white/10 text-white/40 font-mono">
        {{ tech }}
      </span>
    }
  </div>

  <!-- Botón llamativo en lugar del link invisible -->
  <a [routerLink]="['/perfil', programador().slug]"
     class="mt-2 w-full text-center bg-white/5 border border-white/10 hover:bg-cyan-500/10 hover:border-cyan-500/40 text-cyan-400 hover:text-cyan-300 text-xs font-mono tracking-widest uppercase py-3 px-4 rounded-lg transition-all">
    Ver información completa →
  </a>

</div>
