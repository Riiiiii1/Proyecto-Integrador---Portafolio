<div class="border border-white/10 bg-white/5 rounded-xl p-6 flex flex-col gap-4 hover:border-cyan-500/40 transition-all">

  <div class="flex items-center gap-4">
    <img 
      [src]="programador().fotoPerfil" 
      [alt]="programador().nombre"
      class="w-16 h-16 rounded-full object-cover border-2 border-cyan-500/30"/>

    <div>
      <h3 class="text-white font-bold text-lg">{{ programador().nombre }}</h3>
      <p class="text-cyan-400 text-xs font-mono tracking-widest uppercase">
        {{ programador().especialidad }}
      </p>
    </div>
  </div>

  <p class="text-white/50 text-sm leading-relaxed">
    {{ programador().descripcionBreve }}
  </p>

  <div class="flex flex-wrap gap-2">
    <span class="text-xs px-3 py-1 rounded border border-white/10 text-white/40 font-mono">
      Angular
    </span>
    <span class="text-xs px-3 py-1 rounded border border-white/10 text-white/40 font-mono">
      Firebase
    </span>
  </div>

  <a [routerLink]="['/perfil', programador().slug]"
     class="text-cyan-400 text-xs font-mono tracking-widest uppercase hover:text-white transition-colors flex items-center gap-2 mt-2">
    Revisar Perfil A Detalle →
  </a>

</div>
